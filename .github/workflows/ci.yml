name: CI

# Run on pushes to main and on every pull request.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip          # cache pip downloads between runs

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # The embedding model (~80MB) is downloaded on first use; cache it so
      # later runs don't re-download.
      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-${{ runner.os }}-all-MiniLM-L6-v2

      - name: Lint
        run: |
          ruff check .
          ruff format --check .

      - name: Test
        run: pytest -q
